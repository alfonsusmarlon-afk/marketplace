{% extends "base.html" %}

{% block title %}Pesan - ReBekas{% endblock %}

{% block content %}
<style>
  .chat-layout { display: flex; flex-direction: row; height: 70vh; min-height: 450px; background: #fff; border: 1px solid var(--gray-200); border-radius: var(--radius); overflow: hidden; box-shadow: var(--shadow-md); }
  .chat-sidebar { width: 280px; background: var(--gray-50); border-right: 1px solid var(--gray-200); display: flex; flex-direction: column; }
  .chat-main { flex: 1; display: flex; flex-direction: column; background: #fdfdfd; }
  
  @media (max-width: 768px) {
     .chat-layout { flex-direction: column; height: 85vh; }
     .chat-sidebar { width: 100%; height: 160px; flex-shrink: 0; border-right: none; border-bottom: 1px solid var(--gray-200); }
  }
</style>
<main style="max-width: 1000px; margin: auto;">
    <h2 style="font-size:1.5rem;font-weight:800;margin-bottom:1rem">💬 Obrolan Langsung</h2>

    <div class="chat-layout">
        <div class="chat-sidebar">
            <div style="padding:15px; font-weight:800; border-bottom:1px solid var(--gray-200); background:#fff; font-size: 14px; color:var(--gray-700)">👥 Daftar Obrolan</div>
            <div id="chat-contacts" style="flex:1; overflow-y:auto;">
                <div style="padding:15px; color:var(--gray-500); font-size:13px; text-align:center; margin-top:10px;">Memuat kontak...</div>
            </div>
        </div>

        <div class="chat-main">
            <div id="chat-header" style="padding:15px; border-bottom:1px solid var(--gray-200); background:#fff; display:flex; align-items:center; gap:12px;">
                <div style="width:36px;height:36px;border-radius:50%;background:var(--gray-300);color:#fff;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;" id="chat-header-avatar">?</div>
                <div>
                    <div id="chat-header-name" style="font-weight:800; font-size:15px;">Pilih kontak terlebih dahulu</div>
                    <div style="font-size:12px; color:var(--gray-500);">Marketplace ReBekas</div>
                </div>
            </div>

            <div id="chat-box" style="flex:1; padding:1.5rem; overflow-y:auto; display:flex; flex-direction:column; gap:12px;">
                <div style="text-align:center; color:var(--gray-500); margin-top:20%;">Pilih dari daftar kontak di kiri.</div>
            </div>

            <div style="padding:1rem; border-top:1px solid var(--gray-200); background:#fff; display:flex; gap:10px;">
                <input type="text" id="chat-input" placeholder="Tuliskan pesan Anda..." style="flex:1; padding:12px 16px; border:1px solid var(--gray-300); border-radius:20px; font-size:14px; outline:none;" onkeypress="if(event.key === 'Enter') sendMessage()" disabled>
                <button id="chat-send-btn" class="btn btn-primary" style="border-radius:20px; padding: 0 24px;" onclick="sendMessage()" disabled>Kirim</button>
            </div>
        </div>
    </div>
</main>
<script>
  document.addEventListener('DOMContentLoaded', () => { setTimeout(() => { loadChatMessages(); }, 400); });
</script>
{% endblock %}
