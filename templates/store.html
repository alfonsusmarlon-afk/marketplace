{% extends "base.html" %}

{% block title %}Toko Saya - ReBekas{% endblock %}

{% block content %}
<main style="max-width: 900px; margin: auto;">
  <h2 style="font-size:1.5rem;font-weight:800;margin-bottom:1.5rem">🏪 Manajemen Toko Saya</h2>
  
  <div style="background:var(--primary); color:white; padding:2rem; border-radius:var(--radius); margin-bottom:2.5rem; text-align:center;">
    <p style="font-size:1.1rem; margin-bottom:0.5rem; opacity:0.9;">Total Pendapatan (Pesanan Selesai)</p>
    <h1 id="store-revenue" style="font-size:2.5rem; font-weight:800; margin:0;">Rp 0</h1>
  </div>
  
  <div style="background:#fff; border:1px solid var(--gray-200); border-radius:var(--radius); overflow-x:auto;">
    <table style="width:100%; border-collapse: collapse; text-align:left; font-size: 14px;">
      <thead>
        <tr style="background: var(--gray-100); border-bottom:2px solid var(--gray-200);">
          <th style="padding:15px;">Nama Produk</th>
          <th style="padding:15px;">Harga</th>
          <th style="padding:15px;">Status Pengiriman</th>
          <th style="padding:15px;">Tindakan Penjual</th>
        </tr>
      </thead>
      <tbody id="store-items-list">
      </tbody>
    </table>
  </div>
</main>

<div id="edit-modal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); z-index:9999; align-items:center; justify-content:center;">
    <div style="background:#fff; padding:2rem; border-radius:12px; width:90%; max-width:500px; max-height: 90vh; overflow-y: auto; box-shadow: var(--shadow-lg);">
        <h3 style="margin-bottom:1.5rem; font-weight:800; border-bottom:2px solid var(--gray-100); padding-bottom:10px;">✏️ Edit Opsi Informasi Produk</h3>
        <input type="hidden" id="edit-id">
        
        <div class="form-group" style="margin-bottom:1rem">
            <label class="form-label" style="font-weight:700">Nama Produk</label>
            <input type="text" class="form-input" id="edit-title" style="width:100%; padding:8px; border:1px solid #ccc; border-radius:6px">
        </div>
        <div class="form-group" style="margin-bottom:1rem">
            <label class="form-label" style="font-weight:700">Harga Barang (Rp)</label>
            <input type="number" class="form-input" id="edit-price" style="width:100%; padding:8px; border:1px solid #ccc; border-radius:6px">
        </div>
        <div class="form-group" style="margin-bottom:1rem">
            <label class="form-label" style="font-weight:700">Kategori</label>
            <select id="edit-cat" style="width:100%; padding:8px; border:1px solid #ccc; border-radius:6px">
                <option value="elektronik">📱 Elektronik</option>
                <option value="fashion">👗 Fashion</option>
                <option value="furniture">🪑 Furniture</option>
                <option value="kendaraan">🚗 Kendaraan</option>
                <option value="olahraga">⚽ Olahraga</option>
                <option value="buku">📚 Buku</option>
            </select>
        </div>
        <div class="form-group" style="margin-bottom:1rem">
            <label class="form-label" style="font-weight:700">Kondisi Barang</label>
            <select id="edit-cond" style="width:100%; padding:8px; border:1px solid #ccc; border-radius:6px">
                <option value="Sangat Baik">Sangat Baik</option>
                <option value="Baik">Baik</option>
                <option value="Cukup">Cukup</option>
            </select>
        </div>
        <div class="form-group" style="margin-bottom:1rem">
            <label class="form-label" style="font-weight:700">Deskripsi Barang</label>
            <textarea id="edit-desc" style="width:100%; min-height:80px; padding:8px; border:1px solid #ccc; border-radius:6px"></textarea>
        </div>
        
        <div style="display:flex; gap:10px; margin-top:1.5rem; justify-content:flex-end">
            <button class="btn btn-primary" onclick="saveEditProduct()">Simpan Perubahan</button>
            <button class="btn btn-outline" onclick="closeEditModal()">Batal</button>
        </div>
    </div>
</div>

<script>
  document.addEventListener('DOMContentLoaded', () => { setTimeout(() => { loadStoreDashboard(); }, 500); });
</script>
{% endblock %}
