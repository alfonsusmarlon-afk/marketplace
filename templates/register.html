{% extends "base.html" %}

{% block title %}Daftar - ReBekas{% endblock %}

{% block content %}
<main>
  <div class="auth-wrapper">
    <div class="auth-card">
      <div class="auth-logo">ReBekas</div>
      <div class="auth-subtitle">Buat akun gratis dan mulai berjualan</div>
      <button class="btn-google" onclick="loginWithGoogle()">
        <svg width="18" height="18" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.5 0 6.6 1.2 9.1 3.2l6.8-6.8C35.8 2.5 30.2 0 24 0 14.6 0 6.6 5.4 2.6 13.3l7.9 6.1C12.4 13 17.8 9.5 24 9.5z"/><path fill="#4285F4" d="M46.5 24.5c0-1.6-.1-3.1-.4-4.5H24v8.5h12.7c-.6 3-2.3 5.5-4.9 7.2l7.7 6c4.5-4.1 7-10.2 7-17.2z"/><path fill="#FBBC05" d="M10.5 28.6A14.5 14.5 0 0 1 9.5 24c0-1.6.3-3.1.8-4.6l-7.9-6.1A23.9 23.9 0 0 0 0 24c0 3.9.9 7.5 2.6 10.7l7.9-6.1z"/><path fill="#34A853" d="M24 48c6.2 0 11.4-2 15.2-5.5l-7.7-6c-2 1.4-4.7 2.2-7.5 2.2-6.2 0-11.5-4.2-13.4-9.9l-7.9 6.1C6.6 42.6 14.6 48 24 48z"/></svg>
        Daftar dengan Google
      </button>
      <div class="auth-divider">atau daftar dengan email</div>
      <div class="form-group">
        <label class="form-label">Nama Lengkap</label>
        <input class="form-input" type="text" id="reg-name" placeholder="Nama kamu" />
      </div>
      <div class="form-group">
        <label class="form-label">Email</label>
        <input class="form-input" type="email" id="reg-email" placeholder="nama@email.com" />
      </div>
      <div class="form-group">
        <label class="form-label">Kata Sandi</label>
        <input class="form-input" type="password" id="reg-pass" placeholder="Min. 8 karakter" />
      </div>
      <button class="btn btn-primary btn-full" onclick="registerEmail()">Buat Akun</button>
      <div class="auth-switch">Sudah punya akun? <a href="/login">Masuk di sini</a></div>
    </div>
  </div>
</main>
{% endblock %}
