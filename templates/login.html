{% extends "base.html" %}

{% block title %}Masuk — ReBekas{% endblock %}

{% block content %}
<main style="max-width: 420px; margin: auto; padding-top: 3rem;">
  <div style="background: #fff; border: 1px solid var(--gray-200); border-radius: 16px; padding: 2.5rem; box-shadow: var(--shadow-md);">
    <h2 style="font-size: 1.5rem; font-weight: 800; margin-bottom: 0.5rem; text-align: center;">Selamat Datang Kembali</h2>
    <p style="color: var(--gray-500); font-size: 14px; text-align: center; margin-bottom: 2rem;">Silakan masuk untuk melanjutkan transaksi</p>
    
    <div class="form-group">
      <label class="form-label">Alamat Email</label>
      <input type="email" class="form-input" id="login-email" placeholder="nama@email.com" />
    </div>
    
    <div class="form-group" style="margin-bottom: 1.5rem;">
      <label class="form-label">Kata Sandi</label>
      <input type="password" class="form-input" id="login-pass" placeholder="••••••••" />
    </div>
    
    <button class="btn btn-primary btn-full" style="padding: 12px; font-size: 14px; font-weight: 600;" onclick="loginEmail()">Masuk Akun</button>
    
    <div style="display: flex; align-items: center; margin: 1.5rem 0; color: var(--gray-400); font-size: 13px;">
      <hr style="flex: 1; border: 0; border-top: 1px solid var(--gray-200);" />
      <span style="padding: 0 10px;">atau</span>
      <hr style="flex: 1; border: 0; border-top: 1px solid var(--gray-200);" />
    </div>

    <script src="https://accounts.google.com/gsi/client" async defer></script>

    <div id="g_id_onload"
         data-client_id="999544977980-r1vcsqe30c273mu5ufhbt5lba58eqpri.apps.googleusercontent.com"
         data-callback="handleGoogleLogin">
    </div>
    <div class="g_id_signin" data-type="standard" data-theme="outline" data-size="large" data-width="100%"></div>

    <p style="text-align: center; margin-top: 2rem; font-size: 14px; color: var(--gray-600); margin-bottom: 0;">
      Belum punya akun? <a href="/register" style="color: var(--primary); font-weight: 600; text-decoration: none;">Daftar Sekarang</a>
    </p>
  </div>
</main>

<script>
async function handleGoogleLogin(response) {
    try {
        const res = await fetch('/api/auth/google', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ token: response.credential })
        });
        
        if (!res.ok) throw new Error('Validasi Token Google Gagal');
        
        const userData = await res.json();
        localStorage.setItem('currentUser', JSON.stringify(userData));
        window.location.href = '/'; 
    } catch (e) {
        alert('Gagal autentikasi menggunakan Akun Google Anda.');
    }
}
</script>
{% endblock %}
