{% extends "base.html" %}

{% block title %}Pesanan Saya - ReBekas{% endblock %}

{% block content %}
<main style="max-width: 900px; margin: auto;">
  <h2 style="font-size:1.5rem;font-weight:800;margin-bottom:1.5rem">📦 Riwayat Pesanan Saya</h2>
  
  <div style="background:#fff; border:1px solid var(--gray-200); border-radius:var(--radius); overflow-x:auto;">
    <table style="width:100%; border-collapse: collapse; text-align:left; font-size: 14px;">
      <thead>
        <tr style="background: var(--gray-100); border-bottom:2px solid var(--gray-200);">
          <th style="padding:15px;">ID Pesanan</th>
          <th style="padding:15px;">Total Harga</th>
          <th style="padding:15px;">Status Pesanan</th>
          <th style="padding:15px;">Tindakan</th>
        </tr>
      </thead>
      <tbody id="buyer-orders-list">
        <tr><td colspan="4" style="text-align:center; padding:2rem;">Memuat daftar pesanan...</td></tr>
      </tbody>
    </table>
  </div>
</main>
<script>
  document.addEventListener('DOMContentLoaded', () => { setTimeout(() => { loadBuyerOrders(); }, 500); });
</script>
{% endblock %}
