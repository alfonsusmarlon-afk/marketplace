{% extends "base.html" %}

{% block title %}Pesanan Saya - ReBekas{% endblock %}

{% block content %}
<main style="max-width: 900px; margin: auto;">
  <h2 style="font-size:1.5rem;font-weight:800;margin-bottom:1.5rem">📦 Riwayat Pesanan Saya</h2>
  
  <div style="background:#fff; border:1px solid var(--gray-200); border-radius:var(--radius); overflow-x:auto;">
    <table style="width:100%; border-collapse: collapse; text-align:left; font-size: 14px;">
      <thead>
        <tr style="background: var(--gray-100); border-bottom:2px solid var(--gray-200);">
          <th style="padding:15px;">ID Pesanan</th>
          <th style="padding:15px;">Total Harga</th>
          <th style="padding:15px;">Status Pesanan</th>
          <th style="padding:15px;">Tindakan</th>
        </tr>
      </thead>
      <tbody id="buyer-orders-list">
        <tr><td colspan="4" style="text-align:center; padding:2rem;">Memuat daftar pesanan...</td></tr>
      </tbody>
    </table>
  </div>
</main>

<div id="review-modal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); z-index:9999; align-items:center; justify-content:center;">
    <div style="background:#fff; padding:2rem; border-radius:12px; width:90%; max-width:400px; text-align:center;">
        <h3 style="margin-bottom:1rem; font-weight:800;">⭐ Beri Ulasan Belanja</h3>
        <input type="hidden" id="review-product-id">
        <select id="review-rating" class="form-input" style="margin-bottom:1rem; width:100%; padding:10px;">
            <option value="5">⭐⭐⭐⭐⭐ Sangat Bagus</option>
            <option value="4">⭐⭐⭐⭐ Bagus</option>
            <option value="3">⭐⭐⭐ Lumayan</option>
            <option value="2">⭐⭐ Kurang</option>
            <option value="1">⭐ Sangat Buruk</option>
        </select>
        <textarea id="review-comment" class="form-input" placeholder="Tulis pengalaman belanja Anda di sini..." style="width:100%; height:80px; padding:10px; margin-bottom:1rem; resize:none;"></textarea>
        <div style="display:flex; gap:10px; justify-content:center;">
            <button class="btn btn-primary" onclick="submitReview()">Kirim Ulasan</button>
            <button class="btn btn-outline" onclick="document.getElementById('review-modal').style.display='none'">Batal</button>
        </div>
    </div>
</div>
<script>
  document.addEventListener('DOMContentLoaded', () => { setTimeout(() => { loadBuyerOrders(); }, 500); });
</script>
{% endblock %}
