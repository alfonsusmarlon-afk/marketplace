{% extends "base.html" %}

{% block title %}Jual Barang - ReBekas{% endblock %}

{% block content %}
<main style="max-width: 600px; margin: auto;">
  <h2 style="font-size:1.5rem;font-weight:800;margin-bottom:1.5rem">📦 Jual Barang Bekas Anda</h2>
  
  <div style="background:#fff; border:1px solid var(--gray-200); border-radius:var(--radius); padding:2rem;">
    
    <div class="form-group" style="margin-bottom: 1.5rem;">
      <label class="form-label">Foto Produk Asli (Opsional/Bisa diganti Emoji)</label>
      <div style="border: 2px dashed var(--gray-300); border-radius:8px; padding: 2rem; cursor:pointer; text-align:center;" onclick="document.getElementById('product-image-file').click()">
          <div id="product-upload-preview" style="font-size:30px; margin-bottom:10px;">📸</div>
          <div style="font-size:14px; font-weight:600; color:var(--primary);">Pilih Foto Barang</div>
          <input type="file" id="product-image-file" accept="image/*" style="display:none" onchange="handleProductImageUpload(this)">
      </div>
    </div>

    <div class="form-group">
      <label class="form-label">Judul Iklan *</label>
      <input type="text" class="form-input" id="up-title" placeholder="Contoh: iPhone 12 Bekas Mulus">
    </div>
    
    <div class="form-group">
      <label class="form-label">Harga Barang (Rp) *</label>
      <input type="number" class="form-input" id="up-price" placeholder="Contoh: 5000000">
    </div>
    
    <div style="display:grid; grid-template-columns: 1fr 1fr; gap:15px;">
      <div class="form-group">
        <label class="form-label">Kategori *</label>
        <select class="form-input" id="up-cat">
          <option value="elektronik">📱 Elektronik</option>
          <option value="fashion">👗 Fashion</option>
          <option value="furniture">🪑 Furniture</option>
          <option value="kendaraan">🚗 Kendaraan</option>
          <option value="olahraga">⚽ Olahraga</option>
          <option value="buku">📚 Buku</option>
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">Kondisi *</label>
        <select class="form-input" id="up-cond">
          <option value="Sangat Baik">Sangat Baik</option>
          <option value="Baik">Baik</option>
          <option value="Cukup">Cukup</option>
        </select>
      </div>
    </div>
    
    <div class="form-group">
      <label class="form-label">Lokasi Anda *</label>
      <input type="text" class="form-input" id="up-loc" placeholder="Contoh: Jakarta Selatan">
    </div>

    <div class="form-group">
      <label class="form-label">Gratis Ongkir?</label>
      <select class="form-input" id="up-ongkir">
        <option value="false">Tidak</option>
        <option value="true">Ya, Gratis Ongkir</option>
      </select>
    </div>
    
    <div class="form-group">
      <label class="form-label">Deskripsi *</label>
      <textarea class="form-input" id="up-desc" placeholder="Jelaskan kondisi minus, kelengkapan, dll" style="min-height: 100px; resize:none;"></textarea>
    </div>
    
    <button class="btn btn-primary btn-full" style="padding: 12px; font-size: 1rem; margin-top: 1rem;" onclick="submitProduct()">🚀 Publikasikan Barang</button>
  </div>
</main>
{% endblock %}
